# ==============================================================================
# BankHire Azure App Service Deployment Workflow
# ==============================================================================
# This workflow builds Docker image, pushes to ACR, and deploys to App Service
# 
# Triggers:
# - Push to main branch (auto-deploy)
# - Manual workflow dispatch
# - Pull requests (build/test only, no deploy)
# ==============================================================================

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Ensure only one deployment per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE_NAME: 'bankhire-backend'
  DOCKER_REGISTRY: '${{ secrets.ACR_NAME }}.azurecr.io'

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: bankhire/package-lock.json

      - name: Install backend dependencies
        working-directory: bankhire
        run: npm ci

      - name: Run backend tests
        working-directory: bankhire
        run: npm test
        env:
          NODE_ENV: test

      - name: Security audit
        working-directory: bankhire
        run: npm audit --audit-level=critical
        continue-on-error: true

  # ============================================================================
  # BUILD DOCKER IMAGE & DEPLOY
  # ============================================================================
  build-and-deploy:
    name: Build Docker Image and Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-flight - validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          az_version="$(az --version 2>/dev/null | head -n 1 || true)"
          if [ -z "$az_version" ]; then
            echo "Azure CLI not found on runner (unexpected for ubuntu-latest)." >&2
            exit 1
          fi

          # Secret values are not printed; we only validate presence.
          require_non_empty() {
            local label="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "❌ Missing required GitHub secret: $label" >&2
              exit 1
            fi
          }

          require_non_empty "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          require_non_empty "AZURE_CLIENT_SECRET" "${{ secrets.AZURE_CLIENT_SECRET }}"
          require_non_empty "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          require_non_empty "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          require_non_empty "ACR_NAME" "${{ secrets.ACR_NAME }}"

          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          APP_NAME_ALT="${{ secrets.APP_SERVICE_NAME }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="$APP_NAME_ALT"; fi
          if [ -z "$APP_NAME" ]; then
            echo "❌ Missing required GitHub secret: AZURE_WEBAPP_NAME (or APP_SERVICE_NAME)" >&2
            exit 1
          fi

          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          RG_ALT="${{ secrets.RESOURCE_GROUP }}"
          if [ -z "$RG" ]; then RG="$RG_ALT"; fi
          if [ -z "$RG" ]; then
            echo "❌ Missing required GitHub secret: AZURE_RESOURCE_GROUP (or RESOURCE_GROUP)" >&2
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          # Avoid requiring ACR username/password; use the Azure service principal token from `azure/login@v2`.
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Generate image tag
        id: image-tag
        run: |
          # Always produce tag-commit so the Docker tags list is valid for all event types (including pull_request).
          echo "tag-commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./bankhire
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag-commit }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME || secrets.APP_SERVICE_NAME }}
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP || secrets.RESOURCE_GROUP }}
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}

      - name: Get deployed App Service URL
        id: webapp-url
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME || secrets.APP_SERVICE_NAME }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP || secrets.RESOURCE_GROUP }}"

          if [ -z "$APP_NAME" ] || [ -z "$RG" ]; then
            echo "Missing App Service name or Resource Group (check GitHub secrets)." >&2
            exit 1
          fi

          if ! command -v az >/dev/null 2>&1; then
            echo "Azure CLI (az) is not available on this runner." >&2
            exit 1
          fi

          HOSTNAME="$(az webapp show -g "$RG" -n "$APP_NAME" --query defaultHostName -o tsv)"
          if [ -z "$HOSTNAME" ]; then
            echo "Could not determine defaultHostName for App Service '$APP_NAME'." >&2
            exit 1
          fi

          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"
          echo "url=https://$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Configure container port settings
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME || secrets.APP_SERVICE_NAME }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP || secrets.RESOURCE_GROUP }}"

          # The app listens on 3002 by default (see `bankhire/Dockerfile` + `PORT` default in env validator).
          # App Service needs `WEBSITES_PORT` to route traffic to the correct container port.
          az webapp config appsettings set \
            -g "$RG" \
            -n "$APP_NAME" \
            --settings PORT=3002 WEBSITES_PORT=3002 WEBSITES_CONTAINER_START_TIME_LIMIT=600

      - name: Validate App Service app settings for /health
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME || secrets.APP_SERVICE_NAME }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP || secrets.RESOURCE_GROUP }}"

          require_setting() {
            local key="$1"
            # Query app settings by key name and return the first matching value.
            local value
            value="$(az webapp config appsettings list -g "$RG" -n "$APP_NAME" --query "[?name=='$key'].value | [0]" -o tsv || true)"
            if [ -z "$value" ] || [ "$value" = "null" ]; then
              echo "$key"
              return 1
            fi
            return 0
          }

          missing_keys=()

          NODE_ENV="$(az webapp config appsettings list -g "$RG" -n "$APP_NAME" --query "[?name=='NODE_ENV'].value | [0]" -o tsv || true)"
          if [ -z "$NODE_ENV" ] || [ "$NODE_ENV" = "null" ]; then
            missing_keys+=("NODE_ENV")
          fi

          # Must be present for the app to start (see `bankhire/src/utils/envValidator.js`)
          for k in DB_HOST DB_PORT DB_NAME DB_USER DB_PASS JWT_SECRET; do
            if ! require_setting "$k"; then
              missing_keys+=("$k")
            fi
          done

          # In production the validator requires email settings + admin email.
          if [ "${NODE_ENV:-}" = "production" ]; then
            for k in EMAIL_USER EMAIL_PASS ADMIN_EMAIL; do
              if ! require_setting "$k"; then
                missing_keys+=("$k")
              fi
            done
          fi

          if [ "${#missing_keys[@]}" -gt 0 ]; then
            echo "❌ Missing required App Service application settings:"
            printf -- "- %s\n" "${missing_keys[@]}"
            echo "Add these under App Service -> Configuration, then re-run the workflow."
            exit 1
          fi

      - name: Run smoke tests
        run: |
          APP_URL="${{ steps.webapp-url.outputs.url }}"
          echo "Testing container liveness: $APP_URL/live"
          for i in {1..10}; do
            # /live only checks the process is up, so it helps separate boot issues from DB issues.
            if curl -f -s "$APP_URL/live" > /dev/null; then
              echo "✅ Liveness check passed!"
              break
            fi
            echo "Attempt $i: /live not ready yet, retrying in 5 seconds..."
            sleep 5
          done

          echo "Testing readiness/health endpoint: $APP_URL/health"
          for i in {1..30}; do
            status_code="$(curl -s -o /tmp/health_body.txt -w "%{http_code}" "$APP_URL/health" || true)"
            if [ "$status_code" = "200" ]; then
              echo "✅ Health check passed!"
              cat /tmp/health_body.txt
              exit 0
            fi

            if [ "$i" -eq 30 ]; then
              echo "❌ Health check failed after 30 attempts"
              echo "Last HTTP status: $status_code"
              echo "Last response body:"
              cat /tmp/health_body.txt || true
              exit 1
            fi

            echo "Attempt $i: Health check failed (HTTP $status_code), retrying in 10 seconds..."
            sleep 10
          done

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App Service**: \`${{ secrets.AZURE_WEBAPP_NAME || secrets.APP_SERVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.webapp-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY
